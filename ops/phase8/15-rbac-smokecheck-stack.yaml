apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbac-smokecheck
  namespace: monitoring
  labels:
    app: rbac-smokecheck
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rbac-smokecheck
  template:
    metadata:
      labels:
        app: rbac-smokecheck
    spec:
      serviceAccountName: rbac-smokecheck
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rbac-smokecheck
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["python", "-c"]
          args:
            - |
              import http.server
              import os
              import ssl
              import threading
              import time
              import urllib.request

              denied = 0
              token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
              ca_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              namespace = os.getenv("CHECK_NAMESPACE", "dev")
              url = f"https://kubernetes.default.svc/api/v1/namespaces/{namespace}/pods"

              def poll():
                  global denied
                  while True:
                      try:
                          with open(token_path, "r", encoding="utf-8") as handle:
                              token = handle.read().strip()
                          request = urllib.request.Request(url)
                          request.add_header("Authorization", f"Bearer {token}")
                          context = ssl.create_default_context(cafile=ca_path)
                          with urllib.request.urlopen(request, context=context, timeout=5) as response:
                              denied = 0 if response.status == 200 else 1
                      except Exception:
                          denied = 1
                      time.sleep(5)

              class Handler(http.server.BaseHTTPRequestHandler):
                  def do_GET(self):
                      if self.path != "/metrics":
                          self.send_response(404)
                          self.end_headers()
                          return
                      body = f"rbac_smokecheck_denied {denied}\n".encode("utf-8")
                      self.send_response(200)
                      self.send_header("Content-Type", "text/plain; version=0.0.4")
                      self.send_header("Content-Length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)

                  def log_message(self, format, *args):
                      return

              threading.Thread(target=poll, daemon=True).start()
              http.server.ThreadingHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: rbac-smokecheck
  namespace: monitoring
  labels:
    app: rbac-smokecheck
spec:
  selector:
    app: rbac-smokecheck
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rbac-smokecheck
  namespace: monitoring
  labels:
    app: incident-tracker
spec:
  namespaceSelector:
    matchNames:
      - monitoring
  selector:
    matchLabels:
      app: rbac-smokecheck
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 5s
