apiVersion: v1
kind: ConfigMap
metadata:
  name: incident-response-drill-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  incident-response-drill.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 0,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {"options": {"0": {"text": "OK"}, "1": {"text": "DENIED"}}, "type": "value"}
              ],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "options": {"colorMode": "background", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [
            {"expr": "rbac_smokecheck_denied", "refId": "A"}
          ],
          "title": "RBAC Smokecheck Status",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "single"}},
          "targets": [
            {"expr": "rbac_smokecheck_denied", "legendFormat": "denied", "refId": "A"}
          ],
          "title": "RBAC Smokecheck Timeline",
          "type": "timeseries"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["phase8", "incident-response"],
      "templating": {"list": []},
      "time": {"from": "now-30m", "to": "now"},
      "title": "Incident Response Drill",
      "uid": "incident-response-drill",
      "version": 1
    }
