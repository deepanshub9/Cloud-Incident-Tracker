apiVersion: v1
kind: ServiceAccount
metadata:
  name: rbac-smokecheck
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rbac-smokecheck-readonly
  namespace: dev
subjects:
  - kind: ServiceAccount
    name: rbac-smokecheck
    namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: readonly
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rbac-smokecheck-metrics
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app: rbac-smokecheck
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 8080
          protocol: TCP
  policyTypes:
    - Ingress
